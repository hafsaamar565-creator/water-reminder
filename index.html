<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Study Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <header class="top-banner">
            <h1 id="greeting">Happy Studying! ✨</h1>
            <p id="quote">"Small steps lead to big results."</p>
            <button onclick="updateQuote()" class="btn-action">New Inspiration</button>
        </header>

        <div class="dashboard">
            <!-- Updated Music Player with Next Button -->
            <div class="card music-card">
                <h3>Focus Music 🎵</h3>
                <div class="disc-area">
                    <div class="vinyl" id="vinylDisc">
                        <div class="inner-circle"></div>
                    </div>
                </div>
                <p id="songTitle" style="font-size: 12px; margin-bottom: 10px; font-weight: 600;">Song #1</p>
                <div class="music-controls">
                    <button id="playPauseBtn" class="btn-green">Play</button>
                    <button id="nextBtn" class="btn-beige">Next</button>
                </div>
                <audio id="studyAudio" loop>
                    <source src="lofi-girl.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="card timer-card">
                <h3>Focus Timer ⏳</h3>
                <div class="time-display" id="timeDisplay">25:00</div>
                <div class="timer-buttons">
                    <button id="startBtn" class="btn-green">Start</button>
                    <button id="resetBtn" class="btn-beige">Reset</button>
                </div>
            </div>

            <div class="card todo-card">
                <h3>Today's Goals 📝</h3>
                <div class="input-box">
                    <input type="text" id="taskInput" placeholder="Add a new task...">
                    <button id="addBtn" class="btn-pink">Add</button>
                </div>
                <ul id="taskContainer"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
